version: '3.8'

services:
  # Local Postgres with pgvector for development and smoke data runs
  postgres:
    image: pgvector/pgvector:pg16
    container_name: anivibe_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anivibe}
      POSTGRES_USER: ${POSTGRES_USER:-anivibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anivibe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anivibe} -d ${POSTGRES_DB:-anivibe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anivibe_network

  # Redis for caching only
  redis:
    image: redis:7-alpine
    container_name: anivibe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anivibe_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anivibe_backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - SECRET_KEY=${SECRET_KEY}
      
      # Neon/Postgres
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://anivibe:anivibe@postgres:5432/anivibe}
      - DATABASE_MIGRATION_URL=${DATABASE_MIGRATION_URL:-postgresql://anivibe:anivibe@postgres:5432/anivibe}

      # Clerk
      - CLERK_ISSUER=${CLERK_ISSUER}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}

      # Cloudflare R2
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
      
      # Redis
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      
      # API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MAL_CLIENT_ID=${MAL_CLIENT_ID}
      - ANILIST_CLIENT_ID=${ANILIST_CLIENT_ID}
      
      # ML Service
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://localhost:8080}
      
      # Feature Flags
      - ENABLE_IMAGE_SEARCH=${ENABLE_IMAGE_SEARCH:-false}
      - ENABLE_GNN=${ENABLE_GNN:-false}
      - USE_GPU=${USE_GPU:-false}
      
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anivibe_network
    restart: unless-stopped

networks:
  anivibe_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
