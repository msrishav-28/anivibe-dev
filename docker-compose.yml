version: '3.8'

services:
  # Redis for caching only
  redis:
    image: redis:7-alpine
    container_name: anivibe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anivibe_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anivibe_backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - SECRET_KEY=${SECRET_KEY}
      
      # Supabase (only database)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      
      # API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MAL_CLIENT_ID=${MAL_CLIENT_ID}
      - ANILIST_CLIENT_ID=${ANILIST_CLIENT_ID}
      
      # ML Service
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://localhost:8080}
      
      # Feature Flags
      - ENABLE_IMAGE_SEARCH=${ENABLE_IMAGE_SEARCH:-false}
      - ENABLE_GNN=${ENABLE_GNN:-false}
      - USE_GPU=${USE_GPU:-false}
      
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - anivibe_network
    restart: unless-stopped

networks:
  anivibe_network:
    driver: bridge

volumes:
  redis_data:
