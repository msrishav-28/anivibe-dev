# Render Blueprint for AniVibe Backend
# Deploy: connect the repo in Render dashboard; Render will auto-detect this file.

services:
  - type: web
    name: anivibe-backend
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MIGRATION_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: anivibe-redis
          property: connectionString
      - key: ML_SERVICE_URL
        value: https://your-modal-app.modal.run
      - key: USE_GPU
        value: false
      - key: ENABLE_IMAGE_SEARCH
        value: false
      - key: ENABLE_GNN
        value: false
      - key: CORS_ORIGINS
        value: https://anivibe.vercel.app,https://www.anivibe.com

  - type: redis
    name: anivibe-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
